# Local run of the production image. amd64 (emulated on Apple Silicon) — the
# browser path can be flaky locally; the deployed amd64 env is the real target.
services:
  ibud:
    build:
      context: .
    image: ibud:local
    platform: linux/amd64
    ports:
      - "3000:3000"
      - "4848:4848"
    env_file:
      # Defaults to ibud.config.json (http://localhost:4848). Set
      # AGENT_BROWSER_DASHBOARD_URL here for a different origin (e.g. OrbStack).
      - .env.local
    volumes:
      - ibud-data:/app/data
    restart: unless-stopped

  # Relays to ibud:4848 so OrbStack gives the dashboard its own HTTPS origin
  # (https://viewport.<project>.orb.local). Plain Docker uses localhost:4848.
  viewport:
    image: alpine/socat
    command: TCP-LISTEN:4848,fork,reuseaddr TCP:ibud:4848
    depends_on:
      - ibud
    restart: unless-stopped

volumes:
  ibud-data:
