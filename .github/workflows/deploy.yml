# Build the iBud image, push to ECR, and roll it out on EKS.
#
# Prerequisites created by Terraform (apps/test-suite in the terraform repo):
#   - ECR repo:        test-suite-${ENVIRONMENT}
#   - K8s namespace:   test-suite
#   - K8s deployment:  test-suite  (image is managed by this workflow; Terraform
#                                   ignores changes to the container image)
#
# Required repo configuration (Settings → Secrets and variables → Actions):
#   - secret  AWS_DEPLOY_ROLE_ARN  — IAM role this workflow assumes via OIDC
#                                     (ECR push + eks:DescribeCluster + kubectl)
#
# Confirm the account id, region, cluster, and ENVIRONMENT below match the
# target chosen in Terraform before enabling.
name: Deploy iBud

# Manual-only for now. Switch to `push: { branches: [main] }` once the Terraform
# infra (ECR repo, namespace, deployment) and AWS_DEPLOY_ROLE_ARN secret exist.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC for AWS role assumption
  contents: read

env:
  AWS_ACCOUNT_ID: "820899951368"
  AWS_REGION: us-east-2
  ENVIRONMENT: dev # which cluster/ECR slot this deploys to
  APP: test-suite

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ env.APP }}-${{ env.ENVIRONMENT }}
        run: |
          IMAGE="$REGISTRY/$REPO"
          docker build -t "$IMAGE:sha-${GITHUB_SHA::12}" -t "$IMAGE:latest" .
          docker push "$IMAGE:sha-${GITHUB_SHA::12}"
          docker push "$IMAGE:latest"
          echo "IMAGE=$IMAGE:sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Roll out to EKS
        run: |
          aws eks update-kubeconfig --name "eks-${ENVIRONMENT}" --region "$AWS_REGION"
          kubectl set image "deployment/${APP}" \
            "${APP}=${IMAGE}" -n "${APP}"
          kubectl rollout status "deployment/${APP}" -n "${APP}" --timeout=5m
