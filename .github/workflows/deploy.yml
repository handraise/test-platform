# Build the iBud image, push to ECR, roll out on EKS.
# Auth: OIDC → newsamp-github-actions-role → eks-${ENVIRONMENT}-github-actions-eks-role.
name: Deploy iBud

# Manual until infra exists + test-platform is in the role's OIDC trust.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC for AWS role assumption
  contents: read

env:
  AWS_ACCOUNT_ID: "820899951368"
  AWS_REGION: us-east-2
  ENVIRONMENT: dev # which cluster/ECR slot this deploys to
  APP: test-suite

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/newsamp-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume EKS deploy role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/eks-${{ env.ENVIRONMENT }}-github-actions-eks-role
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2.1.4

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ env.APP }}-${{ env.ENVIRONMENT }}
        run: |
          IMAGE="$REGISTRY/$REPO"
          # Must be amd64: EKS nodes are x86 and agent-browser's Chrome for
          # Testing has no Linux ARM64 build.
          docker build --platform linux/amd64 \
            -t "$IMAGE:sha-${GITHUB_SHA::12}" -t "$IMAGE:latest" .
          docker push "$IMAGE:sha-${GITHUB_SHA::12}"
          docker push "$IMAGE:latest"
          echo "IMAGE=$IMAGE:sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Roll out to EKS
        run: |
          aws eks update-kubeconfig --name "eks-${ENVIRONMENT}" --region "$AWS_REGION"
          kubectl set image "deployment/${APP}" \
            "${APP}=${IMAGE}" -n "${APP}"
          kubectl rollout status "deployment/${APP}" -n "${APP}" --timeout=5m
